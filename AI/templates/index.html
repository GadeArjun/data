<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NxtAi Pro | Ultra</title>

    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');

        :root {
            --bg-main: #0f172a;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-main);
            background-image: radial-gradient(circle at 50% -20%, #1e1b4b 0%, #0f172a 100%);
            color: #f8fafc;
            height: 100vh;
            overflow: hidden;
        }

        /* Glassmorphism Classes */
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Message Bubbles */
        .user-msg {
            background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
            box-shadow: 0 4px 15px rgba(67, 56, 202, 0.3);
        }

        .ai-msg {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Custom Scrollbar */
        #chatbox::-webkit-scrollbar { width: 5px; }
        #chatbox::-webkit-scrollbar-track { background: transparent; }
        #chatbox::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        /* Typing Animation */
        .typing-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        /* Prose Overrides */
        .prose { color: #cbd5e1 !important; font-size: 0.95rem; }
        .prose strong { color: #fff; }
        .prose pre { background: #020617 !important; border: 1px solid #1e293b !important; }
        .prose code { color: #e2e8f0 !important; background: #1e293b; padding: 2px 5px; border-radius: 4px; font-family: 'Fira Code', monospace !important; }

        .stop-btn {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body class="flex items-center justify-center p-0 sm:p-6">

    <div class="chat-container relative w-full max-w-5xl h-full sm:h-[85vh] glass-panel sm:rounded-3xl shadow-2xl flex flex-col overflow-hidden">
        
        <header class="px-8 py-5 border-b border-white/5 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="relative">
                    <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-[0_0_20px_rgba(99,102,241,0.4)]">
                        <i class="mdi mdi-auto-fix text-2xl text-white"></i>
                    </div>
                    <span class="absolute -bottom-1 -right-1 w-4 h-4 bg-green-500 border-4 border-[#1e293b] rounded-full"></span>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-tight text-white">NxtAi <span class="text-indigo-400">Ultra</span></h1>
                    <p class="text-[10px] text-slate-400 font-medium uppercase tracking-[0.2em]">Neural Processing Engine</p>
                </div>
            </div>
            <div class="flex gap-2">
                <div class="h-8 w-8 rounded-full border border-white/10 flex items-center justify-center text-slate-400 hover:text-white cursor-pointer transition-colors">
                    <i class="mdi mdi-dots-vertical"></i>
                </div>
            </div>
        </header>

        <main id="chatbox" class="flex-grow overflow-y-auto p-8 space-y-10 scroll-smooth">
            <div id="welcome-screen" class="h-full flex flex-col items-center justify-center text-center space-y-6">
                <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center border border-white/10 mb-4">
                    <i class="mdi mdi-shimmer text-4xl text-indigo-400"></i>
                </div>
                <h2 class="text-2xl font-semibold text-white">System Initialized</h2>
                <p class="text-slate-400 max-w-sm text-sm leading-relaxed">Ready for high-fidelity code generation, complex reasoning, and technical analysis.</p>
            </div>
        </main>


        <footer class="p-6 bg-gradient-to-t from-slate-900/50 to-transparent">
            <div class="max-w-4xl mx-auto relative">
                <div class="glass-panel rounded-2xl p-2.5 flex items-end gap-3 ring-1 ring-white/10 focus-within:ring-indigo-500/50 transition-all shadow-2xl">
                    <div class="p-2 text-slate-500">
                        <!-- <i class="mdi mdi-attachment-plus text-xl hover:text-indigo-400 cursor-pointer"></i> -->
                    </div>
                    <textarea id="user_input" rows="1" placeholder="Describe your technical challenge..." 
                        class="w-full bg-transparent border-none focus:ring-0 resize-none py-3 px-2 text-slate-200 text-sm leading-relaxed placeholder:text-slate-500"
                        onkeydown="handleKey(event)" style="outline:none;"></textarea>
                    
                    <button onclick="sendMessage()" id="send_btn"
                        class="bg-indigo-600 hover:bg-indigo-500 text-white w-12 h-12 rounded-xl flex items-center justify-center transition-all active:scale-90 shadow-lg shadow-indigo-500/20">
                        <i class="mdi mdi-arrow-up-bold text-xl"></i>
                    </button>

                    <button id="abort_btn" style="display: none;" onclick="stopGeneration()" class="stop-btn group flex items-center gap-2 px-5 py-2.5 bg-red-500/10 hover:bg-red-500/20 border border-red-500/50 text-red-400 rounded-full text-xs font-bold transition-all backdrop-blur-md">
                <i class="mdi mdi-stop-circle-outline text-lg animate-pulse"></i>
                <!-- STOP GENERATING -->
            </button>
                </div>
            </div>
        </footer>
    </div>

    <script>
        let currentAbortController = null; // --- Abort Logic ---

        // --- 1. Logic: Markdown & Syntax Setup ---
        marked.setOptions({
            gfm: true,
            breaks: true,
            highlight: function(code, lang) {
                const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                return hljs.highlight(code, { language }).value;
            }
        });

        const renderer = new marked.Renderer();
        renderer.code = function(token) {
            const codeText = typeof token === 'object' ? token.text : token;
            const language = typeof token === 'object' ? (token.lang || 'code') : arguments[1];
            const highlighted = !!(language && hljs.getLanguage(language)) 
                                ? hljs.highlight(codeText, { language }).value 
                                : codeText;

            return `
            <div class="group relative my-8 rounded-2xl overflow-hidden border border-white/10 bg-black/40 shadow-2xl">
                <div class="flex items-center justify-between px-5 py-3 bg-white/5 border-b border-white/5 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                    <span class="flex items-center gap-2"><i class="mdi mdi-xml text-indigo-400 text-sm"></i> ${language}</span>
                    <button onclick="copyToClipboard(this)" class="hover:text-white transition-colors flex items-center gap-1.5">
                        <i class="mdi mdi-content-copy"></i> COPY
                    </button>
                </div>
                <pre class="overflow-x-auto text-[13px] leading-relaxed"><code class="hljs language-${language}">${highlighted}</code></pre>
            </div>`;
        };
        marked.use({ renderer });

        // --- 2. Logic: Processors ---
        function processAiResponse(text) {
            if (!text || typeof text !== 'string') return "";
            let processed = text.replace(/\$\$([\s\S]+?)\$\$/g, (m, f) => `<div class="math-block">${katex.renderToString(f, { displayMode: true, throwOnError: false })}</div>`);
            processed = processed.replace(/\$([^\$\n]+?)\$/g, (m, f) => katex.renderToString(f, { displayMode: false, throwOnError: false }));
            return DOMPurify.sanitize(marked.parse(processed), { ADD_ATTR: ['target'] });
        }

        // --- 3. Interaction Logic ---
        function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
        const inputField = document.getElementById("user_input");
        inputField.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; });

        function stopGeneration() {
            if (currentAbortController) {
                currentAbortController.abort();
                currentAbortController = null;
                finalizeUI();
            }
        }

        function finalizeUI() {
            document.getElementById("user_input").disabled = false;
            document.getElementById("send_btn").style.display = "flex";
            document.getElementById("abort_btn").style.display = "none";
            document.getElementById("user_input").focus();
        }

        async function copyToClipboard(btn) {
            const code = btn.closest('.group').querySelector('code').innerText;
            await navigator.clipboard.writeText(code);
            btn.innerHTML = '<i class="mdi mdi-check text-green-400"></i> COPIED';
            setTimeout(() => btn.innerHTML = '<i class="mdi mdi-content-copy"></i> COPY', 2000);
        }

        // --- 4. Main Streaming ---
        async function sendMessage() {
            const input = document.getElementById("user_input");
            const btn = document.getElementById("send_btn");
            const chatbox = document.getElementById("chatbox");
            const abortBtn = document.getElementById("abort_btn");
            const welcome = document.getElementById("welcome-screen");
            
            const message = input.value.trim();
            if (!message) return;

            if (welcome) welcome.remove();

            input.value = "";
            input.style.height = 'auto';
            input.disabled = true;
            btn.style.display = "none";
            abortBtn.style.display = "flex";

            // User Bubble
            chatbox.insertAdjacentHTML('beforeend', `
                <div class="flex justify-end msg-animate">
                    <div class="max-w-[80%] user-msg text-white px-6 py-4 rounded-[2rem] rounded-tr-none shadow-xl text-sm leading-relaxed">
                        ${message}
                    </div>
                </div>`);

            // AI Bubble
            const aiId = 'ai-' + Date.now();
            chatbox.insertAdjacentHTML('beforeend', `
                <div class="flex justify-start gap-5 msg-animate">
                    <div class="w-10 h-10 rounded-xl bg-slate-800 border border-white/10 flex items-center justify-center text-indigo-400 shrink-0 shadow-lg">
                        <i class="mdi mdi-robot-industrial text-xl"></i>
                    </div>
                    <div class="max-w-[85%] ai-msg px-6 py-4 rounded-[2rem] rounded-tl-none prose prose-invert text-sm" id="${aiId}">
                        <div class="flex gap-2 py-2">
                            <span class="typing-dot" style="animation-delay: 0s"></span>
                            <span class="typing-dot" style="animation-delay: 0.2s"></span>
                            <span class="typing-dot" style="animation-delay: 0.4s"></span>
                        </div>
                    </div>
                </div>`);
            
            chatbox.scrollTo({ top: chatbox.scrollHeight, behavior: 'smooth' });

            const responseContainer = document.getElementById(aiId);
            let accumulatedText = "";
            currentAbortController = new AbortController();

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message }),
                    signal: currentAbortController.signal
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    accumulatedText += decoder.decode(value, { stream: true });
                    responseContainer.innerHTML = processAiResponse(accumulatedText);
                    
                    if (chatbox.scrollHeight - chatbox.scrollTop <= chatbox.clientHeight + 200) {
                        chatbox.scrollTop = chatbox.scrollHeight;
                    }
                }

            } catch (err) {
                if (err.name === 'AbortError') {
                    responseContainer.innerHTML += `<p class="text-amber-500/80 italic mt-4 border-t border-white/5 pt-2 text-[11px]"><i class="mdi mdi-alert-circle-outline"></i> Generation halted by user.</p>`;
                } else {
                    responseContainer.innerHTML = `<span class="text-red-400">Connection error.</span>`;
                }
            } finally {
                finalizeUI();
                currentAbortController = null;
            }
        }
    </script>
</body>
</html>
