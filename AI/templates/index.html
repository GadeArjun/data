<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NxtAi Pro | Advanced Assistant</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');

        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Markdown Overrides */
        .prose pre {
            padding: 0 !important;
            background: #0f172a !important;
            border-radius: 0.75rem;
            overflow: hidden;
            margin: 1.5rem 0;
            border: 1px solid #334155;
        }

        .prose code {
            font-family: 'Fira Code', monospace;
            font-size: 0.875rem;
        }

        .prose p {
            margin-bottom: 1rem;
            color: #334155;
            line-height: 1.7;
        }

        /* Code Header Style */
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            padding: 0.5rem 1rem;
            color: #94a3b8;
            font-size: 0.75rem;
            border-bottom: 1px solid #334155;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Message Animations */
        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg-animate {
            animation: messageIn 0.3s ease-out forwards;
        }

        .typing-dot {
            width: 4px;
            height: 4px;
            background: #94a3b8;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }
    </style>
</head>

<body class="h-screen flex items-center justify-center p-0 sm:p-4">

    <div
        class="chat-container w-full max-w-6xl h-full sm:h-[90vh] bg-white sm:rounded-2xl shadow-2xl shadow-blue-900/10 flex flex-col overflow-hidden border border-slate-200">

        <header
            class="px-6 py-4 border-bottom border-slate-100 flex items-center justify-between bg-white/80 backdrop-blur-md sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <div
                    class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-600/30">
                    <i class="mdi mdi-robot-outline text-xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-slate-800 leading-none">NxtAi Pro</h1>
                    <span
                        class="text-[11px] text-green-500 font-medium uppercase tracking-wider flex items-center gap-1">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span> Online
                    </span>
                </div>
            </div>
            <div class="flex gap-2">
                <button class="p-2 text-slate-400 hover:text-slate-600 transition-colors"><i
                        class="mdi mdi-dots-vertical text-xl"></i></button>
            </div>
        </header>

        <main id="chatbox" class="flex-grow overflow-y-auto p-6 space-y-8 bg-slate-50/50">
            <div class="flex flex-col items-center justify-center py-10 text-center space-y-3 opacity-60">
                <div class="w-16 h-16 bg-slate-200 rounded-full flex items-center justify-center">
                    <i class="mdi mdi-chat-processing-outline text-3xl text-slate-400"></i>
                </div>
                <p class="text-slate-500 max-w-xs">Ask NxtAi about code, technical concepts, or general knowledge.</p>
            </div>
        </main>

        <footer class="p-4 bg-white border-t border-slate-100">
            <div
                class="max-w-4xl mx-auto flex items-end gap-3 bg-slate-100 rounded-2xl p-2 transition-all focus-within:bg-white focus-within:ring-2 focus-within:ring-blue-500/20 border border-transparent focus-within:border-blue-200">
                <textarea id="user_input" rows="1" placeholder="Type your message..."
                    class="w-full bg-transparent border-none focus:ring-0 resize-none py-3 px-4 text-slate-700 leading-relaxed"
                    onkeypress="handleKey(event)" style="outline:none;"></textarea>
                <button onclick="sendMessage()" id="send_btn"
                    class="bg-blue-600 hover:bg-blue-700 text-white w-12 h-12 rounded-xl flex items-center justify-center transition-all active:scale-95 disabled:opacity-50 disabled:pointer-events-none shadow-lg shadow-blue-600/20">
                    <i class="mdi mdi-send text-xl"></i>
                </button>
            </div>
            <p class="text-[10px] text-center text-slate-400 mt-3">NxtAi Pro can make mistakes. Verify important
                information.</p>
        </footer>
    </div>

    <script>
        // Custom Marked Renderer for Advanced Code Blocks
        const renderer = new marked.Renderer();
        renderer.code = function (code, language) {
            const validLang = !!(language && hljs.getLanguage(language));
            const highlighted = validLang ? hljs.highlight(code, { language }).value : hljs.highlightAuto(code).value;
            const langName = language || 'code';

            return `
                <div class="code-wrapper my-4">
                    <div class="code-header">
                        <span><i class="mdi mdi-xml mr-1"></i> ${langName}</span>
                        <button onclick="copyCode(this)" class="hover:text-white transition-colors flex items-center gap-1">
                            <i class="mdi mdi-content-copy"></i> Copy
                        </button>
                    </div>
                    <pre><code class="hljs language-${langName}">${highlighted}</code></pre>
                </div>`;
        };

        marked.setOptions({ renderer, breaks: true });

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function copyCode(btn) {
            const code = btn.parentElement.nextElementSibling.innerText;
            navigator.clipboard.writeText(code);
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="mdi mdi-check"></i> Copied!';
            btn.classList.add('text-green-400');
            setTimeout(() => {
                btn.innerHTML = original;
                btn.classList.remove('text-green-400');
            }, 2000);
        }

        async function sendMessage() {
            const input = document.getElementById("user_input");
            const btn = document.getElementById("send_btn");
            const message = input.value.trim();
            if (!message) return;

            // UI Reset
            input.value = "";
            input.disabled = true;
            btn.disabled = true;

            const chatbox = document.getElementById("chatbox");

            // User Message Template
            const userHtml = `
                <div class="flex justify-end msg-animate">
                    <div class="max-w-[80%] bg-blue-600 text-white px-5 py-3 rounded-2xl rounded-tr-none shadow-md shadow-blue-600/10 text-sm leading-relaxed">
                        ${message}
                    </div>
                </div>`;
            chatbox.insertAdjacentHTML('beforeend', userHtml);

            // Assistant Message Template
            const assistantId = 'ai-' + Date.now();
            const assistantHtml = `
                <div class="flex justify-start gap-4 msg-animate">
                    <div class="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center text-white shrink-0 shadow-lg">
                        <i class="mdi mdi-robot text-sm"></i>
                    </div>
                    <div class="max-w-[85%] prose prose-slate text-sm" id="${assistantId}">
                        <div class="flex gap-1 py-3"><span class="typing-dot"></span><span class="typing-dot" style="animation-delay: 0.2s"></span><span class="typing-dot" style="animation-delay: 0.4s"></span></div>
                    </div>
                </div>`;
            chatbox.insertAdjacentHTML('beforeend', assistantHtml);
            chatbox.scrollTo({ top: chatbox.scrollHeight, behavior: 'smooth' });

            const responseContainer = document.getElementById(assistantId);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let accumulatedText = "";

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;

                    accumulatedText += decoder.decode(value);
                    responseContainer.innerHTML = marked.parse(accumulatedText);

                    // Smart Auto-Scroll
                    const isAtBottom = chatbox.scrollHeight - chatbox.scrollTop <= chatbox.clientHeight + 150;
                    if (isAtBottom) {
                        chatbox.scrollTop = chatbox.scrollHeight;
                    }
                }
            } catch (error) {
                responseContainer.innerHTML = `<span class="text-red-500 italic"><i class="mdi mdi-alert-circle"></i> Connection lost. Please try again.</span>`;
            } finally {
                input.disabled = false;
                btn.disabled = false;
                // Add this inside the 'finally' block in sendMessage()
                input.style.height = 'auto'; // Reset textarea height
                input.focus();
            }
        }
    </script>
</body>

</html>
